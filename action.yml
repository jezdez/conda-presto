name: conda-presto
description: Resolve, transcode, and lint conda environments via the CLI (local) or HTTP API (remote)
branding:
  icon: package
  color: green

inputs:
  mode:
    description: "Run mode: 'local' installs conda-presto on the runner, 'remote' calls a hosted endpoint"
    required: false
    default: local
  command:
    description: "Action to perform: solve, transcode, or lint"
    required: true
    default: solve
  file:
    description: Path to an environment file (environment.yml, pixi.lock, etc.)
    required: false
  specs:
    description: Comma-separated package specs (e.g. "python=3.12,numpy")
    required: false
  channels:
    description: Comma-separated channels (default conda-forge)
    required: false
    default: conda-forge
  platforms:
    description: Comma-separated target platforms (e.g. "linux-64,osx-arm64")
    required: false
  format:
    description: Output format (explicit, environment-yaml, conda-lock-v1, pixi-lock-v6, etc.)
    required: false
  output:
    description: Path to write the response body to (omit for stdout)
    required: false
  endpoint:
    description: "conda-presto base URL (required when mode: remote)"
    required: false
  ignore:
    description: "Comma-separated lint rule codes to ignore (e.g. PIN001,FMT002). Only used with command: lint"
    required: false
  severity:
    description: "Minimum severity for lint findings: info, warning, or error. Only used with command: lint"
    required: false

outputs:
  result:
    description: The response body from conda-presto
    value: ${{ steps.output.outputs.result }}
  solved:
    description: Whether the solve/transcode succeeded without errors ("true" or "false")
    value: ${{ steps.output.outputs.solved }}

runs:
  using: composite
  steps:
    # ── Local mode: install pixi + conda-presto, run CLI ──
    - name: Install pixi
      if: inputs.mode == 'local'
      uses: prefix-dev/setup-pixi@19eac09b398e3d0c747adc7921926a6d802df4da # v0.8.8
      with:
        run-install: false

    - name: Install conda-presto
      if: inputs.mode == 'local'
      shell: bash
      run: pixi global install --git https://github.com/jezdez/conda-presto.git

    - name: Run (local)
      id: local
      if: inputs.mode == 'local'
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_FILE: ${{ inputs.file }}
        INPUT_SPECS: ${{ inputs.specs }}
        INPUT_CHANNELS: ${{ inputs.channels }}
        INPUT_PLATFORMS: ${{ inputs.platforms }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_IGNORE: ${{ inputs.ignore }}
        INPUT_SEVERITY: ${{ inputs.severity }}
      run: |
        set -euo pipefail

        supported="solve, transcode, lint"
        case "${INPUT_COMMAND}" in
          solve|transcode)
            args=()

            if [[ -n "${INPUT_FILE:-}" ]]; then
              if [[ ! -f "${INPUT_FILE}" ]]; then
                echo "::error::File not found: ${INPUT_FILE}"
                exit 1
              fi
              args+=(-f "${INPUT_FILE}")
            fi

            if [[ -n "${INPUT_CHANNELS:-}" ]]; then
              IFS=',' read -ra channels <<< "${INPUT_CHANNELS}"
              for ch in "${channels[@]}"; do args+=(-c "${ch}"); done
            fi

            if [[ -n "${INPUT_PLATFORMS:-}" ]]; then
              IFS=',' read -ra platforms <<< "${INPUT_PLATFORMS}"
              for pl in "${platforms[@]}"; do args+=(-p "${pl}"); done
            fi

            if [[ -n "${INPUT_FORMAT:-}" ]]; then
              args+=(--format "${INPUT_FORMAT}")
            fi

            if [[ -n "${INPUT_SPECS:-}" ]]; then
              IFS=',' read -ra specs <<< "${INPUT_SPECS}"
              args+=("${specs[@]}")
            fi

            echo "::group::conda-presto ${INPUT_COMMAND} (local)"
            echo "args: ${args[*]}"
            echo "::endgroup::"

            tmpout="$(mktemp)"
            if conda-presto "${args[@]}" > "${tmpout}" 2>&1; then
              echo "exit_code=0" >> "$GITHUB_OUTPUT"
            else
              echo "exit_code=$?" >> "$GITHUB_OUTPUT"
            fi
            echo "tmpout=${tmpout}" >> "$GITHUB_OUTPUT"
            ;;

          lint)
            echo "::warning::lint command in local mode is not yet supported. Use mode: remote with a running conda-presto instance."
            tmpout="$(mktemp)"
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            echo "tmpout=${tmpout}" >> "$GITHUB_OUTPUT"
            ;;

          *)
            echo "::error::Unsupported command '${INPUT_COMMAND}'. Supported: ${supported}"
            exit 1
            ;;
        esac

    # ── Remote mode: POST to hosted endpoint ──
    - name: Run (remote)
      id: remote
      if: inputs.mode == 'remote'
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_FILE: ${{ inputs.file }}
        INPUT_SPECS: ${{ inputs.specs }}
        INPUT_CHANNELS: ${{ inputs.channels }}
        INPUT_PLATFORMS: ${{ inputs.platforms }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_ENDPOINT: ${{ inputs.endpoint }}
        INPUT_IGNORE: ${{ inputs.ignore }}
        INPUT_SEVERITY: ${{ inputs.severity }}
      run: |
        set -euo pipefail

        supported="solve, transcode, lint"
        if [[ -z "${INPUT_ENDPOINT:-}" ]]; then
          echo "::error::Input 'endpoint' is required when mode is 'remote'"
          exit 1
        fi

        case "${INPUT_COMMAND}" in
          solve)
            url="${INPUT_ENDPOINT}/resolve"
            ;;
          transcode)
            url="${INPUT_ENDPOINT}/transcode"
            ;;
          lint)
            url="${INPUT_ENDPOINT}/lint"
            ;;
          *)
            echo "::error::Unsupported command '${INPUT_COMMAND}'. Supported: ${supported}"
            exit 1
            ;;
        esac

        body='{}'

        if [[ -n "${INPUT_FILE:-}" ]]; then
          if [[ ! -f "${INPUT_FILE}" ]]; then
            echo "::error::File not found: ${INPUT_FILE}"
            exit 1
          fi
          file_content="$(cat "${INPUT_FILE}")"
          file_basename="$(basename "${INPUT_FILE}")"
          body=$(echo "${body}" | jq \
            --arg file "${file_content}" \
            --arg filename "${file_basename}" \
            '. + {file: $file, filename: $filename}')
        fi

        if [[ -n "${INPUT_SPECS:-}" ]]; then
          specs_json=$(echo "${INPUT_SPECS}" | tr ',' '\n' | jq -R . | jq -s .)
          body=$(echo "${body}" | jq --argjson specs "${specs_json}" '. + {specs: $specs}')
        fi

        if [[ -n "${INPUT_CHANNELS:-}" ]]; then
          channels_json=$(echo "${INPUT_CHANNELS}" | tr ',' '\n' | jq -R . | jq -s .)
          body=$(echo "${body}" | jq --argjson channels "${channels_json}" '. + {channels: $channels}')
        fi

        if [[ -n "${INPUT_PLATFORMS:-}" ]]; then
          platforms_json=$(echo "${INPUT_PLATFORMS}" | tr ',' '\n' | jq -R . | jq -s .)
          body=$(echo "${body}" | jq --argjson platforms "${platforms_json}" '. + {platforms: $platforms}')
        fi

        query_params=""
        if [[ -n "${INPUT_FORMAT:-}" ]]; then
          enc=$(printf '%s' "${INPUT_FORMAT}" | jq -sRr @uri)
          query_params="format=${enc}"
        fi
        if [[ -n "${INPUT_IGNORE:-}" ]]; then
          enc=$(printf '%s' "${INPUT_IGNORE}" | jq -sRr @uri)
          [[ -n "${query_params}" ]] && query_params="${query_params}&"
          query_params="${query_params}ignore=${enc}"
        fi
        if [[ -n "${INPUT_SEVERITY:-}" ]]; then
          enc=$(printf '%s' "${INPUT_SEVERITY}" | jq -sRr @uri)
          [[ -n "${query_params}" ]] && query_params="${query_params}&"
          query_params="${query_params}severity=${enc}"
        fi
        if [[ -n "${query_params}" ]]; then
          url="${url}?${query_params}"
        fi

        echo "::group::conda-presto ${INPUT_COMMAND} (remote)"
        echo "URL: ${url}"
        echo "Body: $(echo "${body}" | jq -c '{specs, channels, platforms, filename}')"
        echo "::endgroup::"

        tmpout="$(mktemp)"
        http_code=$(curl -sS -o "${tmpout}" -w "%{http_code}" \
          -X POST "${url}" \
          -H "Content-Type: application/json" \
          -d "${body}")

        if [[ "${http_code}" -ge 400 ]]; then
          echo "exit_code=1" >> "$GITHUB_OUTPUT"
          echo "::error::conda-presto returned HTTP ${http_code}"
          cat "${tmpout}" | jq . 2>/dev/null || cat "${tmpout}"
        else
          echo "exit_code=0" >> "$GITHUB_OUTPUT"
        fi
        echo "tmpout=${tmpout}" >> "$GITHUB_OUTPUT"

    # ── Shared output handling ──
    - name: Process output
      id: output
      if: always()
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUTPUT: ${{ inputs.output }}
        LOCAL_EXIT: ${{ steps.local.outputs.exit_code }}
        LOCAL_TMP: ${{ steps.local.outputs.tmpout }}
        REMOTE_EXIT: ${{ steps.remote.outputs.exit_code }}
        REMOTE_TMP: ${{ steps.remote.outputs.tmpout }}
      run: |
        set -euo pipefail

        if [[ "${INPUT_MODE}" == "local" ]]; then
          exit_code="${LOCAL_EXIT:-1}"
          tmpout="${LOCAL_TMP:-}"
        else
          exit_code="${REMOTE_EXIT:-1}"
          tmpout="${REMOTE_TMP:-}"
        fi

        if [[ -z "${tmpout}" || ! -f "${tmpout}" ]]; then
          echo "solved=false" >> "$GITHUB_OUTPUT"
          echo "::error::No output produced"
          exit 1
        fi

        response_body="$(cat "${tmpout}")"
        rm -f "${tmpout}"

        if [[ "${exit_code}" != "0" ]]; then
          echo "solved=false" >> "$GITHUB_OUTPUT"
          echo "${response_body}"
          exit 1
        fi

        solved="true"
        if [[ "${INPUT_COMMAND}" == "solve" && -z "${INPUT_FORMAT:-}" ]]; then
          error_count=$(echo "${response_body}" | jq '[.[] | select(.error != null)] | length' 2>/dev/null || echo "0")
          if [[ "${error_count}" -gt 0 ]]; then
            solved="false"
            echo "::warning::${error_count} platform(s) had solver errors"
          fi
        elif [[ "${INPUT_COMMAND}" == "lint" ]]; then
          error_count=$(echo "${response_body}" | jq '.summary.errors' 2>/dev/null || echo "0")
          warning_count=$(echo "${response_body}" | jq '.summary.warnings' 2>/dev/null || echo "0")
          if [[ "${error_count}" -gt 0 ]]; then
            solved="false"
            echo "::error::Lint found ${error_count} error(s) and ${warning_count} warning(s)"
          elif [[ "${warning_count}" -gt 0 ]]; then
            echo "::warning::Lint found ${warning_count} warning(s)"
          fi
        fi

        echo "solved=${solved}" >> "$GITHUB_OUTPUT"

        if [[ -n "${INPUT_OUTPUT:-}" ]]; then
          echo "${response_body}" > "${INPUT_OUTPUT}"
          echo "::notice::Output written to ${INPUT_OUTPUT}"
        else
          echo "${response_body}"
        fi

        result_size=${#response_body}
        if [[ ${result_size} -gt 100000 ]]; then
          echo "result=(output too large, written to ${INPUT_OUTPUT:-stdout})" >> "$GITHUB_OUTPUT"
        else
          {
            echo "result<<CONDA_PRESTO_EOF"
            echo "${response_body}"
            echo "CONDA_PRESTO_EOF"
          } >> "$GITHUB_OUTPUT"
        fi
